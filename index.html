<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Dashboard Container -->
    <main class="dashboard">
      <!-- Header -->
      <header class="dashboard-header">
        <h1 class="dashboard-title">Productivity Dashboard</h1>

        <button class="theme-btn">Change Theme</button>
      </header>

      <!-- Weather Section -->
      <section class="weather-banner">
        <div class="weather-top">
          <p id="current-date">5 June, 2026</p>

          <h2 id="current-time">Saturday, 12:27:37 AM</h2>

          <p id="current-location"></p>
        </div>

        <div class="weather-bottom">
          <div class="weather-main">
            <h3 id="temperature"></h3>

            <p id="condition"></p>
          </div>

          <div class="weather-details">
            <p id="precipitation"></p>
            <p id="humidity"></p>
            <p id="wind"></p>
          </div>
        </div>
      </section>

      <!-- Productivity Cards -->
      <section class="productivity-grid">
        <article class="card todo-card" data-panel="todo-panel">
          <h3>To Do List</h3>
        </article>

        <article class="card planner-card" data-panel="planner-panel">
          <h3>Daily Planner</h3>
        </article>

        <article class="card motivation-card" data-panel="motivation-panel">
          <h3>Motivation</h3>
        </article>

        <article class="card pomodoro-card" data-panel="pomodoro-panel">
          <h3>Pomodoro Timer</h3>
        </article>

        <article
          class="card major-planner-card"
          data-panel="major-planner-panel"
        >
          <h3>Project Planner</h3>
        </article>
      </section>

      <!-- Panel Overlay -->

      <div class="panel-overlay"></div>

      <!-- Panel Wrapper -->
      <section class="panel-wrapper">
        <!-- Panels Layer -->

        <section class="panel todo-panel" data-panel-id="todo-panel">
          <div class="panel-header">
            <h2>Your Personalized Task List</h2>
            <button class="close-btn">Close</button>
          </div>

          <div class="panel-body">
            <div class="todo-content">
              <form class="todo-form">
                <input
                  type="text"
                  class="todo-input"
                  placeholder="Enter Task"
                />
                <textarea
                  class="todo-details"
                  placeholder="Enter Details"
                ></textarea>
                <label class="todo-important"
                  ><input type="checkbox" class="todo-checkbox" /><span
                    >Mark as Important</span
                  ></label
                >

                <button type="submit" class="todo-submit-btn">Add Task</button>
              </form>

              <div class="task-container">
                <div class="empty-state">
                  <h3>No Task Left</h3>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel planner-panel" data-panel-id="planner-panel">
          <div class="panel-header">
            <h2>Plan Your Day</h2>
            <button class="close-btn">Close</button>
          </div>

          <div class="panel-body">
            <div class="planner-container">
              <!-- <article class="time-block">
              <p class="time-range">06:00 - 07:00</p>
              <textarea class="planner-input" placeholder="..."></textarea>
            </article> -->
            </div>
          </div>
        </section>

        <section
          class="panel motivation-panel"
          data-panel-id="motivation-panel"
        >
          <div class="panel-header">
            <h2>Quote of the Day</h2>
            <button class="close-btn">Close</button>
          </div>

          <div class="panel-body">
            <div class="quote-container">
              <span class="quote-mark quote-open">"</span>

              <blockquote class="quote-text">Quote text</blockquote>

              <span class="quote-mark quote-close">"</span>
            </div>
          </div>
        </section>

        <section class="panel pomodoro-panel" data-panel-id="pomodoro-panel">
          <div class="panel-header">
            <h2>Lets Do Some Work</h2>
            <button class="close-btn">Close</button>
          </div>

          <div class="panel-body">
            <div class="pomodoro-container">
              <div class="pomodoro-modes">
                <button class="mode-btn active">Pomodoro</button>

                <button class="mode-btn">Short Break</button>

                <button class="mode-btn">Long Break</button>
              </div>

              <h3 class="timer-display">25:00</h3>

              <button class="start-btn">Start</button>
            </div>
          </div>
        </section>

        <section
          class="panel major-planner-panel"
          data-panel-id="major-planner-panel"
        >
          <div class="panel-header">
            <h2>Major Task List</h2>
            <button class="close-btn">Close</button>
          </div>

          <div class="panel-body">
            <div class="major-task-content">
              <form class="major-task-form">
                <input
                  type="text"
                  class="major-task-title"
                  placeholder="Enter Task"
                />

                <div class="date-row">
                  <div class="date-group">
                    <label>Start Date</label>
                    <input type="date" />
                  </div>

                  <div class="date-group">
                    <label>End Date</label>
                    <input type="date" />
                  </div>
                </div>

                <textarea
                  class="major-task-details"
                  placeholder="Enter Details"
                ></textarea>

                <button type="submit">Add Task</button>
              </form>
              <div class="task-container">
                <div class="empty-state">
                  <h3>No tasks left</h3>
                </div>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
